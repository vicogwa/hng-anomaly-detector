user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # JSON access log format — parsed by detector/monitor.py
    log_format hng_json escape=json
        '{'
            '"source_ip":"$http_x_forwarded_for",'
            '"remote_addr":"$remote_addr",'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"http_host":"$host",'
            '"user_agent":"$http_user_agent",'
            '"request_time":$request_time'
        '}';

    access_log /var/log/nginx/hng-access.log hng_json;

    # Trust Docker internal subnets for X-Forwarded-For
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 512M;

    upstream nextcloud_backend {
        server nextcloud:80;
    }

    upstream detector_dashboard {
        server detector:8080;
    }

    # ── Main server: proxies Nextcloud ─────────────────────────────────────
    server {
        listen 80 default_server;
        server_name _;

        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;

        # Pass all requests to Nextcloud
        location / {
            proxy_pass http://nextcloud_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Nextcloud requires these for proper redirects
            proxy_buffering off;
        }
    }

    # ── Dashboard server: serves the detector UI ────────────────────────────
    # Replace monitor.yourdomain.com with your actual subdomain
    server {
        listen 80;
        server_name monitor.hng-d.zapto.org;

        location / {
            proxy_pass http://detector_dashboard;
            proxy_set_header Host      $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
