version: "3.9"

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nextcloud-data:
  db-data:

networks:
  hng-net:
    driver: bridge

services:

  # ── MariaDB: Nextcloud database ──────────────────────────────────────────
  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - hng-net

  # ── Nextcloud: cloud storage platform ────────────────────────────────────
  nextcloud:
    image: kefaslungu/hng-nextcloud
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - nextcloud-data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    networks:
      - hng-net

  # ── Nginx: reverse proxy + JSON access log ────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - nextcloud
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    networks:
      - hng-net

  # ── Detector: anomaly detection engine ────────────────────────────────────
  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - nginx
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - /var/log/detector:/var/log/detector
    networks:
      - hng-net
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "8080:8080"